---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-test-ci
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-test-ci
  template:
    metadata:
      labels:
        app: redis-test-ci
    spec:
      containers:      
      - name: redis-test-ci
        image: redis:latest
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-test-ci
  namespace: default
spec:
  selector:
    app: redis-test-ci
  ports:
  - name: redis
    protocol: TCP
    port: 6379
    targetPort: 6379
