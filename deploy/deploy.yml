---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-ci
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-ci
  template:
    metadata:
      labels:
        app: test-ci
    spec:
      containers:      
      - name: test-ci
        image: praxamos/test-ci:fc539e91c87131674bfe14aa52258f0a8c3685ee
        command: ["./webapp"]
        env:
        - name: REDIS_URL
          value: redis-test-ci:6379
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: test-ci
  namespace: default
spec:
  selector:
    app: test-ci
  ports:
  - name: web
    protocol: TCP
    port: 8080
    targetPort: 8080    
---    
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-ci
  namespace: "default"
  labels:
    app: test-ci
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - "test-ci.galdon.casa"
      secretName: wildcard-galdon-casa-tls
  rules:
    - host: "test-ci.galdon.casa"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: test-ci
                port:
                  name: web    